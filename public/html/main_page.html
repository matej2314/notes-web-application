<!DOCTYPE html>
<html lang="pl">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Shantell+Sans:ital,wght@0,300..800;1,300..800&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
	<title>Note Web Application v.1</title>
	<link rel="stylesheet" href="/css/styles.css" />
	<link rel="stylesheet" href="/css/app-modern.css" />
	<style>
		html,
		body {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		li {
			width: 100%;
			display: flex;
			flex-direction: row;
			justify-content: center;
		}
	</style>
</head>
<body class="w-screen min-h-screen flex flex-col items-center justify-center font-roboto app-notes">
	<header class="w-full h-fit flex flex-col items-center justify-center">
		<figure class="m-0 w-full flex flex-col items-center">
			<img class="h-60 w-3/4 rounded-lg" alt="Pióro i notes" src="../images/fountain-pen-1851096_1920.jpg" width="1920" height="400" decoding="async">
		</figure>
		<nav class="w-full h-fit flex flex-row items-center justify-center" aria-label="Nawigacja główna">
			<ul class="w-3/4 h-fit flex flex-row items-center justify-around border-2 border-stone-950 rounded-lg font-roboto bg-[#9abdcd]">
				<li><a href="/">Strona główna</a></li>
				<li><span>O projekcie</span></li>
				<li><button type="button" class="logOutBtn">Wyloguj</button></li>
			</ul>
		</nav>
	</header>

	<!-- Okna modalne (fixed); poza <main> żeby nie mieszać z układem kolumn -->
	<div id="change_userMail--form" class="w-1/4 h-fit fixed top-50% left-50% flex flex-col justify-start items-center z-10 border-4 border-white pt-2 px-5 pb-5 bg-[#585243] text-[#dcecf5] rounded-lg max-sm:w-3/4 invisible" role="dialog" aria-modal="true" aria-labelledby="change-mail-title">
		<button type="button" id="closeMailForm--btn" class="absolute w-full h-fit flex flex-row justify-end" aria-label="Zamknij formularz zmiany e-mail">
			<img src="../images/cross.png" alt="" class="relative top-0 right-2" width="24" height="24">
		</button>
		<h2 id="change-mail-title" class="w-full h-full text-xl flex flex-row justify-center my-5">Zmiana adresu e-mail:</h2>
		<form action="#" class="w-3/4 h-full flex flex-col justify-center">
			<label for="name_change--input" id="name_change--label" class="mb-2">Wprowadź nazwę użytkownika:</label>
			<input type="text" id="name_change--input" name="name" class="text-stone-950 border-2 border-stone-950 mb-2" autocomplete="username">
			<label for="old_userMail--input" id="old_userMail--label" class="mb-2">Wprowadź obecny adres e-mail:</label>
			<input type="email" id="old_userMail--input" name="old_userMail--input" class="text-stone-950 border-2 border-stone-950 mb-2" autocomplete="email">
			<label for="new_userMail--input" id="new_userMail--label" class="mb-2">Wprowadź nowy adres e-mail:</label>
			<input type="email" id="new_userMail--input" name="new_userMail--input" class="text-stone-950 border-2 border-stone-950 mb-2" autocomplete="email">
			<input type="submit" value="Zmień e-mail" id="sendNewEmail--btn" class="mt-5 bg-[#6e97ab] p-2 rounded-lg hover:bg-[#3e6173] active:bg-[#3e6173] active:translate-y-1">
		</form>
	</div>

	<div id="change_userPass--form" class="w-1/4 h-fit fixed top-50% left-50% flex flex-col justify-start items-center z-10 border-4 border-white pt-2 px-5 pb-5 bg-[#585243] text-[#dcecf5] rounded-lg invisible max-sm:w-3/4" role="dialog" aria-modal="true" aria-labelledby="change-pass-title">
		<button type="button" id="closePassForm--btn" class="absolute w-full h-fit flex flex-row justify-end" aria-label="Zamknij formularz zmiany hasła">
			<img src="../images/cross.png" alt="" class="relative top-0 right-2" width="24" height="24">
		</button>
		<h2 id="change-pass-title" class="w-full h-full text-xl flex flex-row justify-center my-2">Zmiana hasła:</h2>
		<form action="#" class="w-3/4 h-full flex flex-col justify-center">
			<label for="user_Name--input" id="user_Name--label" class="mb-2">Wprowadź swój login:</label>
			<input type="text" name="user_Name--input" id="user_Name--input" class="text-stone-950" autocomplete="username">
			<label for="user_oldPass--input" id="user_oldPass--label" class="my-2">Wprowadź obecne hasło:</label>
			<input type="password" name="user_oldPass--input" id="user_oldPass--input" class="text-stone-950" minlength="10" maxlength="30" autocomplete="current-password">
			<label for="user_newPass--input" id="user_newPass--label" class="my-2">Wprowadź nowe hasło:</label>
			<input type="password" name="user_newPass--input" id="user_newPass--input" class="text-stone-950" minlength="10" maxlength="30" autocomplete="new-password">
			<input type="submit" id="changePass--btn" class="mt-5 bg-[#6e97ab] p-2 rounded-lg hover:bg-[#3e6173] active:bg-[#3e6173] active:translate-y-1" value="Zmień hasło">
		</form>
	</div>

	<div id="add_userAvatar--form" class="w-fit h-fit fixed top-50% left-50% flex flex-col justify-start items-center z-10 border-4 border-white pt-2 px-5 pb-5 bg-[#585243] text-[#dcecf5] rounded-lg invisible" role="dialog" aria-modal="true" aria-labelledby="avatar-form-title">
		<button type="button" id="close_Avatar--form" class="w-full h-fit flex flex-row justify-end close_Avatar--form" aria-label="Zamknij formularz dodawania avatara">
			<img src="../images/cross.png" alt="" class="relative left-2" width="24" height="24">
		</button>
		<h2 id="avatar-form-title" class="w-full h-fit text-xl flex flex-row justify-center my-5">Dodaj swój avatar</h2>
		<form id="upload_Avatar--form" action="http://localhost:8088/upload" target="_blank" enctype="multipart/form-data" method="post" class="flex flex-col">
			<label for="add_userAvatar--input" id="add_userAvatar--label" class="mb-5">Wybierz plik (wyłącznie format .png, .jpg, .jpeg)</label>
			<input type="file" accept=".jpg,.png,.jpeg" name="userAvatar" id="add_userAvatar--input" class="mb-5">
			<input type="submit" id="add_userAvatar--save__btn" class="mt-5 bg-[#6e97ab] p-2 rounded-lg hover:bg-[#3e6173] active:bg-[#3e6173] active:translate-y-1" value="Zapisz">
		</form>
	</div>

	<div id="editNote--form" class="w-2/4 h-fit fixed top-0 left-0 translate-x-2/4 translate-y-2/4 flex flex-col justify-start items-center z-10 border-4 border-white pt-1 px-5 pb-5 bg-[#585243] text-[#dcecf5] rounded-lg invisible" role="dialog" aria-modal="true" aria-labelledby="edit-note-title">
		<button type="button" id="closeEditForm--btn" class="absolute w-full h-fit flex flex-row justify-end" aria-label="Zamknij edycję notatki">
			<img src="../images/cross.png" alt="" class="relative top-0.5 right-2" width="24" height="24">
		</button>
		<form action="#" class="w-full h-full flex flex-col justify-center mt-5">
			<h2 id="edit-note-title" class="w-full h-full text-xl flex flex-row justify-center mb-2">Edytuj notatkę</h2>
			<label for="input_editTitle" class="mb-2">Nowy tytuł notatki:</label>
			<input type="text" id="input_editTitle" name="input_editTitle" class="text-stone-950 border-2 border-stone-950 mb-2">
			<label for="input_editWeight" class="mb-2">Priorytet:</label>
			<input type="number" name="input_editWeight" id="input_editWeight" class="text-stone-950 border-2 border-stone-950 mb-2">
			<label for="input_editNoteText" id="input_editNoteText--label" class="mb-2">Wpisz nową treść notatki:</label>
			<textarea name="input_editNoteText" id="input_editNoteText" class="h-32 text-stone-950 resize-none pl-1 pt-1 border-2 border-stone-950"></textarea>
			<input type="submit" id="sendNewNote--btn" class="mt-10 bg-[#6e97ab] p-2 rounded-lg hover:bg-[#3e6173] active:bg-[#3e6173] active:translate-y-1" value="Zapisz">
		</form>
	</div>

	<div id="addNote--form" class="w-2/4 h-fit fixed top-0 left-0 translate-x-2/4 translate-y-2/4 flex flex-col justify-start items-center z-10 border-4 border-white pt-1 px-5 pb-5 bg-[#585243] text-[#dcecf5] rounded-lg invisible" role="dialog" aria-modal="true" aria-labelledby="add-note-title">
		<button type="button" id="closeNoteForm--btn" class="absolute w-full h-fit flex flex-row justify-end" aria-label="Zamknij dodawanie notatki">
			<img src="../images/cross.png" alt="" class="relative top-0.5 right-2" width="24" height="24">
		</button>
		<form action="#" class="w-full h-full flex flex-col justify-center mt-5">
			<h2 id="add-note-title" class="w-full h-full text-xl flex flex-row justify-center mb-2">Dodaj notatkę</h2>
			<label for="input_noteTitle" class="mb-2">Tytuł notatki:</label>
			<input id="input_noteTitle" class="text-stone-950 border-2 border-stone-950 mb-2" type="text" name="input_noteTitle" required>
			<label for="input_noteWeight" class="mb-2">Priorytet:</label>
			<input type="number" name="input_noteWeight" id="input_noteWeight" maxlength="1" class="text-stone-950 border-2 border-stone-950 mb-2">
			<label for="input_noteText" id="input_noteText--label" class="mb-2">Treść notatki:</label>
			<textarea name="input_noteText" id="input_noteText" class="h-32 text-stone-950 resize-none pl-1 pt-1 border-2 border-stone-950"></textarea>
			<input type="submit" id="sendNote--btn" class="mt-10 bg-[#6e97ab] p-2 rounded-lg hover:bg-[#3e6173] active:bg-[#3e6173] active:translate-y-1" value="Zapisz">
		</form>
	</div>

	<div id="del_Note--modal" class="w-2/4 h-fit fixed top-0 left-0 translate-x-2/4 translate-y-2/4 flex flex-col justify-start items-center z-10 border-4 border-white pt-1 px-5 pb-5 bg-[#585243] text-[#dcecf5] rounded-lg invisible" role="dialog" aria-modal="true" aria-labelledby="del-note-question">
		<p id="del-note-question" class="w-full h-full text-xl flex flex-row justify-center mb-2">Czy na pewno chcesz usunąć notatkę?</p>
		<div class="w-full h-full flex flex-row justify-center">
			<button type="button" id="del_Note--btnyes" class="mt-5 bg-[#6e97ab] p-2 rounded-lg hover:bg-[#3e6173] active:bg-[#3e6173] active:translate-y-1 text-xl">Tak</button>
			<button type="button" id="del_Note--btnno" class="mt-5 ml-5 bg-[#6e97ab] p-2 rounded-lg hover:bg-[#3e6173] active:bg-[#3e6173] active:translate-y-1 text-xl">Nie</button>
		</div>
	</div>

	<main id="main-content" class="w-3/4 h-fit flex flex-row justify-stretch main_container m-0 p-0">
		<section id="addNote--img" class="h-full w-3/4 border-2 border-stone-950 flex flex-col items-start text-left rounded-tl-lg bg-[#dcecf5]" aria-label="Notatki">
			<div id="sort_cont" class="w-full h-fit flex flex-row flex-wrap items-center justify-start gap-2 mb-2 border border-stone-950 rounded-lg px-3 py-2" role="group" aria-label="Sortowanie notatek">
				<h3 class="m-0 shrink-0 font-roboto font-semibold text-sm">Sortowanie:</h3>
				<button id="fromNewest--btn" type="button" class="shrink-0">od najnowszych</button>
				<button id="fromOldest--btn" type="button" class="shrink-0">od najstarszych</button>
			</div>
			<div class="w-fit max-w-full flex flex-col items-start border-2 border-dotted border-stone-950 pt-2 px-5 pb-10">
				<h3 class="m-0 font-roboto">Dodaj notatkę</h3>
				<button type="button" class="w-24 h-24 mt-4 flex flex-row justify-center addnote" aria-label="Dodaj notatkę">
					<img class="w-full h-full" src="../images/plus-sign.png" alt="" width="96" height="96">
				</button>
			</div>
			<div id="divNotes" class="w-full h-full flex flex-row flex-wrap justify-start content-start gap-4 pb-5 pr-2"></div>
		</section>

		<aside id="userProfile--cont" class="w-3/12 border-2 border-stone-950 rounded-tr-lg flex flex-col items-center bg-[#dcecf5]" aria-labelledby="profile-heading">
			<h2 id="profile-heading" class="w-full h-fit flex flex-row justify-center underline decoration-solid text-lg font-semibold">Twój profil:</h2>
			<div id="profile_img--cont" class="w-24 h-24 mt-3 border-2 flex flex-row border-stone-950 rounded-full overflow-hidden"></div>
			<ul class="w-full h-fit mt-5 flex flex-col align-center">
				<li><button type="button" class="addnote">Dodaj notatkę</button></li>
				<li><button type="button" id="add_userAvatar" class="add_userAvatar">Dodaj swój avatar</button></li>
				<li><button type="button" id="change_userMail--btn">Zmień adres e-mail</button></li>
				<li><button type="button" id="change_userPass--btn">Zmień hasło</button></li>
				<li><button type="button" class="logOutBtn">Wyloguj</button></li>
			</ul>
		</aside>
	</main>

	<footer id="footer--cont" class="w-3/4 h-fit border-2 border-stone-950 flex flex-row justify-center rounded-bl-lg rounded-br-lg footer_container bg-[#9abdcd]">
		<h2 class="h-fit w-fit font-roboto font-medium py-2">Copyright@Mateusz Śliwowski - mateo2314</h2>
	</footer>

	<script type="module" src="/scripts/main.js"></script>
</body>
</html>
